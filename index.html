// 过滤有效车次：未发车、停检未满2分钟
function getValidTrains() {
  const now = new Date();
  return trainData.filter(train => {
    const [h, m] = train.time.split(":").map(Number);
    const target = new Date();
    target.setHours(h, m, 0);
    const diffMin = (target - now) / 60000;
    // 开车前3分钟直接移除（停检满2分钟）
    return diffMin > REMOVE_AFTER_STOP_MIN;
  }).sort((a, b) => {
    const tA = a.time.split(":").map(Number);
    const tB = b.time.split(":").map(Number);
    return (tA[0] * 60 + tA[1]) - (tB[0] * 60 + tB[1]);
  }).slice(0, MAX_SHOW_TOTAL);
}

// 获取车次状态文字与样式
function getTrainStatus(now, train) {
  const [h, m] = train.time.split(":").map(Number);
  const target = new Date();
  target.setHours(h, m, 0);
  const diffMin = (target - now) / 60000;
  const isLocalStart = train.start === "漯河西";
  if (diffMin <= STOP_CHECK_MIN) {
    return { text: "停止检票", cls: "status-red" };
  }
  if (isLocalStart) {
    if (diffMin <= 20) return { text: "开始检票", cls: "status-green" };
    if (diffMin <= 23) return { text: "即将检票", cls: "status-white" };
  } else {
    if (diffMin <= 16) return { text: "开始检票", cls: "status-green" };
    if (diffMin <= 19) return { text: "即将检票", cls: "status-white" };
  }
  return { text: "正在候车", cls: "status-white" };
}

// 渲染单侧列表
function renderTrainBox(boxDom, dataList, tipDom) {
  let htmlStr = "";
  const now = new Date();
  dataList.forEach(item => {
    const status = getTrainStatus(now, item);
    const rowClass = dataList.indexOf(item) % 2 === 0 ? "row-even" : "row-odd";
    htmlStr += `
      <div class="train-row ${rowClass}">
        <div class="no-wrap">${item.trainNo}</div>
        <div class="no-wrap">${item.start}</div>
        <div class="no-wrap">${item.end}</div>
        <div class="no-wrap">${item.time}</div>
        <div class="no-wrap">${item.platform}</div>
        <div class="${status.cls} no-wrap">${status.text}</div>
      </div>
    `;
  });
  boxDom.innerHTML = htmlStr;
}

// 全局渲染分页
function renderAllPage() {
  const valid = getValidTrains();
  // 计算实际需要展示页数
  const rawPage = Math.ceil(valid.length / ONE_PAGE_TOTAL);
  pageCount = Math.min(rawPage, 3);
  if (pageCount === 0) {
    leftTrainList.innerHTML = "";
    rightTrainList.innerHTML = "";
    return;
  }
  // 当前分页数据切片
  const currStart = pageIndex * ONE_PAGE_TOTAL;
  const pageData = valid.slice(currStart, currStart + ONE_PAGE_TOTAL);
  const leftData = pageData.slice(0, PAGE_ROW);
  const rightData = pageData.slice(PAGE_ROW, PAGE_ROW * 2);
  renderTrainBox(leftTrainList, leftData, leftPageTip);
  renderTrainBox(rightTrainList, rightData, rightPageTip);
  leftPageTip.innerText = `左侧 ${pageIndex+1}/${pageCount} 页`;
  rightPageTip.innerText = `右侧 ${pageIndex+1}/${pageCount} 页`;
  renderTrainListPanel();
}

function renderTrainListPanel() {
  let html = "";
  trainData.forEach(item => {
    html += `<div style="margin-top:4px;font-size:13px;color:#bbb">ID ${item.id}｜${item.trainNo}｜${item.start}→${item.end}</div>`;
  });
  trainListShow.innerHTML = html;
}

// 重置翻页计时器
function resetPageTimer() {
  if (timerPage) clearInterval(timerPage);
  pageIndex = 0;
  renderAllPage();
  timerPage = setInterval(() => {
    pageIndex = (pageIndex + 1) % pageCount;
    renderAllPage();
  }, PAGE_STAY_MS);
}

// 每秒校验车次是否过期，自动刷新
function refreshTrainLoop() {
  setInterval(() => {
    const oldValid = getValidTrains();
    const newValid = getValidTrains();
    if (oldValid.length !== newValid.length) {
      resetPageTimer();
    }
    updateTime();
  }, 1000);
}

function updateTime() {
  const d = new Date();
  const weekArr = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
  const week = weekArr[d.getDay()];
  const pad = num => String(num).padStart(2, "0");
  const timeStr = `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${week} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  timeBox.innerText = timeStr;
}

function toggleEditorShow() {
  const isShow = editorPanel.style.display === "block";
  if (!isShow) {
    editorPanel.style.display = "block";
    leftPageTip.style.display = "block";
    rightPageTip.style.display = "block";
    bottomEditBox.style.display = "flex";
    sloganEditBox.style.display = "block";
    toggleEditor.innerText = "关闭后台编辑面板";
  } else {
    editorPanel.style.display = "none";
    leftPageTip.style.display = "none";
    rightPageTip.style.display = "none";
    bottomEditBox.style.display = "none";
    sloganEditBox.style.display = "none";
    toggleEditor.innerText = "打开后台编辑面板";
  }
}

function addNewTrain() {
  const no = editNo.value.trim();
  const start = editStart.value.trim();
  const end = editEnd.value.trim();
  const time = editTime.value.trim();
  const plat = editPlat.value.trim();
  if (!no || !start || !end || !time || !plat) {
    alert("请完整填写车次所有信息");
    return;
  }
  const newId = trainData.length > 0 ? Math.max(...trainData.map(i => i.id)) + 1 : 1;
  trainData.push({id: newId, trainNo: no, start: start, end: end, time: time, platform: plat});
  editNo.value = "";
  editStart.value = "";
  editEnd.value = "";
  editTime.value = "";
  editPlat.value = "";
  resetPageTimer();
}

function updateSingleTrain() {
  const targetId = Number(editTrainId.value.trim());
  if (!targetId) {alert("请输入要修改的车次ID");return;}
  const targetTrain = trainData.find(item => item.id === targetId);
  if (!targetTrain) {alert("未找到对应ID的车次");return;}
  if (editNo.value.trim()) targetTrain.trainNo = editNo.value.trim();
  if (editStart.value.trim()) targetTrain.start = editStart.value.trim();
  if (editEnd.value.trim()) targetTrain.end = editEnd.value.trim();
  if (editTime.value.trim()) targetTrain.time = editTime.value.trim();
  if (editPlat.value.trim()) targetTrain.platform = editPlat.value.trim();
  editTrainId.value = "";
  editNo.value = "";
  editStart.value = "";
  editEnd.value = "";
  editTime.value = "";
  editPlat.value = "";
  resetPageTimer();
}

function bindAllEvents() {
  toggleEditor.addEventListener("click", toggleEditorShow);
  saveMarquee.addEventListener("click", () => {
    marqueeText = inpMarquee.value;
    refreshMarqueeUI();
  });
  inpSloganTop.addEventListener("input", e => sloganData.top = e.target.value);
  inpS1.addEventListener("input", e => sloganData.s1 = e.target.value);
  inpS2.addEventListener("input", e => sloganData.s2 = e.target.value);
  inpS3.addEventListener("input", e => sloganData.s3 = e.target.value);
  inpS4.addEventListener("input", e => sloganData.s4 = e.target.value);
  inpWarn.addEventListener("input", e => sloganData.warn = e.target.value);
  btnAdd.addEventListener("click", addNewTrain);
  btnUpdate.addEventListener("click", updateSingleTrain);
}

function initPage() {
  refreshSloganUI();
  refreshMarqueeUI();
  renderAllPage();
  resetPageTimer();
  bindAllEvents();
  refreshTrainLoop();
  updateTime();
}
