  <style>
    * {

      padding: 0;

      font-family: "Microsoft YaHei", sans-serif;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #054970;
      color: #fff;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      height: 36px;
      background: #022b42;
      display: flex;
      align-items: center;
      padding: 0 16px;
      flex-shrink: 0;
    }
    .edit-btn {
      padding: 4px 12px;
      background: #2382d2;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .main-wrap {
      flex: 1;
      display: flex;
      padding: 12px;
      gap: 12px;
      overflow: hidden;
    }
    .col {
      flex: 1;
      display: flex;
      flex-direction: column;
      border: 2px solid #63b8ff;
    }
    .table-head {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
      background: #175b94;
      padding: 10px 6px;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      flex-shrink: 0;
    }
    .train-list {
      flex: 1;
      overflow: hidden;
    }
    .train-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
      padding: 12px 6px;
      font-size: 22px;
      text-align: center;
    }
    .row-even { background: #0f5080; }
    .row-odd { background: #0a4068; }
    .no-wrap { white-space: nowrap; }
    .tip-page {
      text-align: center;
      padding: 6px;
      font-size: 16px;
      background: #022b42;
      display: none;
    }
    .center-col {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .scroll-slogan {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .slogan-inner {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 26px;
      padding: 10px 16px;
      width: 100%;
    }
    .slogan-title {
      font-size: 46px;
      font-weight: bold;
      color: #ff2222;
      width: 100%;
      text-align: center;
      white-space: nowrap;
    }
    .slogan-text {
      font-size: 38px;
      font-weight: bold;
      color: #ff2222;
      width: 100%;
      text-align: center;
      white-space: nowrap;
    }

      font-weight: bold;
      color: #ffdd00;
      margin-top: 16px;
      width: 100%;
      text-align: center;
      white-space: nowrap;
    }

      background: #02253d;
      padding: 10px;
      border-radius: 4px;
      margin-top: 8px;
      flex-shrink: 0;
      display: none;
    }

      background: #023652;
      display: flex;
      align-items: center;
      <div class="train-list" id="leftTrainList"></div>
      <div class="tip-page" id="leftPageTip"></div>
    </div>

规则说明：<br/>
1.始发站=漯河西 → 始发车；其余过路车<br/>

5.分页提示仅打开编辑面板时显示

// DOM元素
const $ = s => document.querySelector(s);
const toggleEditor = $("#toggleEditor");
const editorPanel = $("#editorPanel");
const leftTrainList = $("#leftTrainList");
const rightTrainList = $("#rightTrainList");
const leftPageTip = $("#leftPageTip");
const rightPageTip = $("#rightPageTip");
const timeBox = $("#timeBox");
const marqueeText = $("#marqueeText");
const marqueeText2 = $("#marqueeText2");
const inpSwitchSec = $("#inpSwitchSec");
const inpMarquee = $("#inpMarquee");
const saveMarquee = $("#saveMarquee");
const bottomEditBox = $("#bottomEditBox");
const sloganEditBox = $("#sloganEditBox");
const inpSloganTop = $("#inpSloganTop");
const inpS1 = $("#inpS1");
const inpS2 = $("#inpS2");
const inpS3 = $("#inpS3");
const inpS4 = $("#inpS4");
const inpWarn = $("#inpWarn");
const sloganTop = $("#sloganTop");
const slogan1 = $("#slogan1");
const slogan2 = $("#slogan2");
const slogan3 = $("#slogan3");
const slogan4 = $("#slogan4");
const sloganWarn = $("#sloganWarn");
const editTrainId = $("#editTrainId");
const editNo = $("#editNo");
const editStart = $("#editStart");
const editEnd = $("#editEnd");
const editTime = $("#editTime");
const editPlat = $("#editPlat");
const btnUpdate = $("#btnUpdate");
const btnAdd = $("#btnAdd");
const trainListShow = $("#trainListShow");

// 分割左右车次
function splitTrainData() {
  const mid = Math.ceil(trainData.length / 2);
  return {
    left: trainData.slice(0, mid),
    right: trainData.slice(mid)
  }
}

// 获取车次状态文字+class
function getTrainStatus(now, train) {
  const [h, m] = train.time.split(":").map(Number);
  const target = new Date();
  target.setHours(h, m, 0);
  const diff = (target - now) / 60000;
  const isStart = train.start === "漯河西";
  if (diff <= 3) return { text: "停止检票", cls: "status-red" };
  if (isStart) {
    if (diff <= 20) return { text: "开始检票", cls: "status-green" };
    if (diff <= 23) return { text: "即将检票", cls: "status-green" };
  } else {
    if (diff <= 16) return { text: "开始检票", cls: "status-green" };
    if (diff <= 19) return { text: "即将检票", cls: "status-green" };
  }
  return { text: "正在候车", cls: "status-white" };
}

// 渲染单侧车次列表
function renderTrainBox(boxEl, dataArr, pageIdx, pageTipEl) {
  const totalPage = Math.ceil(dataArr.length / PAGE_SIZE);
  const curr = pageIdx % totalPage;
  const start = curr * PAGE_SIZE;
  const pageData = dataArr.slice(start, start + PAGE_SIZE);
  let html = "";
  const now = new Date();
  pageData.forEach((item, idx) => {
    const st = getTrainStatus(now, item);
    const rowCls = idx % 2 === 0 ? "row-even" : "row-odd";
    html += `
      <div class="train-row ${rowCls}">
        <div class="no-wrap">${item.trainNo}</div>
        <div class="no-wrap">${item.start}</div>
        <div class="no-wrap">${item.end}</div>
        <div class="no-wrap">${item.time}</div>
        <div class="no-wrap">${item.platform}</div>
        <div class="${st.cls} no-wrap">${st.text}</div>
      </div>
    `;
  });
  boxEl.innerHTML = html;
  pageTipEl.innerHTML = `左侧 ${curr+1}/${totalPage} 页，共${dataArr.length}趟，每${switchSecond}秒切换`;
}

// 渲染全部车次
function renderAllTrain() {
  const split = splitTrainData();
  renderTrainBox(leftTrainList, split.left, leftPageIdx, leftPageTip);
  renderTrainBox(rightTrainList, split.right, rightPageIdx, rightPageTip);
  renderTrainListShow();
}

// 渲染底部车次列表
function renderTrainListShow() {
  let html = "";
  trainData.forEach(item => {
    html += `<div style="margin-top:4px;font-size:13px;color:#bbb">ID ${item.id}｜${item.trainNo}｜${item.start}→${item.end}</div>`;
  })
  trainListShow.innerHTML = html;
}

// 刷新自动翻页定时器
function resetPageTimer() {
  if (timerPage) clearInterval(timerPage);
  timerPage = setInterval(() => {
    leftPageIdx++;
    rightPageIdx++;
    renderAllTrain();
  }, switchSecond * 1000);
}

// 刷新标语显示
function refreshSloganUI() {
  sloganTop.innerText = sloganData.top;
  slogan1.innerText = sloganData.s1;
  slogan2.innerText = sloganData.s2;
  slogan3.innerText = sloganData.s3;
  slogan4.innerText = sloganData.s4;
  sloganWarn.innerText = sloganData.warn;
  inpSloganTop.value = sloganData.top;
  inpS1.value = sloganData.s1;
  inpS2.value = sloganData.s2;
  inpS3.value = sloganData.s3;
  inpS4.value = sloganData.s4;
  inpWarn.value = sloganData.warn;
}

// 刷新跑马灯
function refreshMarqueeUI() {
  marqueeText.innerText = marqueeText;
  marqueeText2.innerText = marqueeText;
  inpMarquee.value = marqueeText;
}

// 刷新时间
function updateTime() {
  const d = new Date();
  const week = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"][d.getDay()];
  const pad = n => String(n).padStart(2, "0");
  const str = `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${week} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  timeBox.innerText = str;
}

// 切换编辑面板显示
function toggleEditorShow() {
  const show = editorPanel.style.display === "block";
  if (!show) {
    editorPanel.style.display = "block";
    leftPageTip.style.display = "block";
    rightPageTip.style.display = "block";
    bottomEditBox.style.display = "flex";
    sloganEditBox.style.display = "block";
    toggleEditor.innerText = "关闭后台编辑面板";
  } else {
    editorPanel.style.display = "none";
    leftPageTip.style.display = "none";
    rightPageTip.style.display = "none";
    bottomEditBox.style.display = "none";
    sloganEditBox.style.display = "none";
    toggleEditor.innerText = "打开后台编辑面板";
  }
}

// 新增车次
function addNewTrain() {
  const no = editNo.value.trim();
  const s = editStart.value.trim();
  const e = editEnd.value.trim();
  const t = editTime.value.trim();
  const p = editPlat.value.trim();
  if (!no || !s || !e || !t || !p) return alert("请完整填写车次信息");
  const newId = trainData.length > 0 ? Math.max(...trainData.map(i=>i.id)) + 1 : 1;
  trainData.push({
    id: newId,
    trainNo: no,
    start: s,
    end: e,
    time: t,
    platform: p
  });
  editNo.value = "";
  editStart.value = "";
  editEnd.value = "";
  editTime.value = "";
  editPlat.value = "";
  renderAllTrain();
}

// 修改车次
function updateOneTrain() {
  const id = Number(editTrainId.value.trim());
  if (!id) return alert("请输入要修改的车次ID");
  const target = trainData.find(i=>i.id === id);
  if (!target) return alert("未找到该ID车次");
  if (editNo.value.trim()) target.trainNo = editNo.value.trim();
  if (editStart.value.trim()) target.start = editStart.value.trim();
  if (editEnd.value.trim()) target.end = editEnd.value.trim();
  if (editTime.value.trim()) target.time = editTime.value.trim();
  if (editPlat.value.trim()) target.platform = editPlat.value.trim();
  editTrainId.value = "";
  editNo.value = "";
  editStart.value = "";
  editEnd.value = "";
  editTime.value = "";
  editPlat.value = "";
  renderAllTrain();
}

// 绑定事件
function bindEvents() {
  toggleEditor.addEventListener("click", toggleEditorShow);
  // 切换秒数
  inpSwitchSec.addEventListener("change", ()=>{
    let val = Number(inpSwitchSec.value);
    if (val <5) val =5;
    switchSecond = val;
    resetPageTimer();
  });
  // 保存底部跑马灯
  saveMarquee.addEventListener("click", ()=>{
    marqueeText = inpMarquee.value;
    refreshMarqueeUI();
  });
  // 标语输入同步
  inpSloganTop.addEventListener("input", e=>sloganData.top = e.target.value);
  inpS1.addEventListener("input", e=>sloganData.s1 = e.target.value);
  inpS2.addEventListener("input", e=>sloganData.s2 = e.target.value);
  inpS3.addEventListener("input", e=>sloganData.s3 = e.target.value);
  inpS4.addEventListener("input", e=>sloganData.s4 = e.target.value);
  inpWarn.addEventListener("input", e=>sloganData.warn = e.target.value);
  // 车次编辑按钮
  btnAdd.addEventListener("click", addNewTrain);
  btnUpdate.addEventListener("click", updateOneTrain);
}

// 初始化
function init() {
  refreshSloganUI();
  refreshMarqueeUI();
  renderAllTrain();
  resetPageTimer();
  bindEvents();
  setInterval(updateTime, 1000);
  updateTime();
}
init();
</script>
